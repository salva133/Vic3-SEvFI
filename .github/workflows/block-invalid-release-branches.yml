name: Block Invalid Release Branches

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - master

jobs:
  block-invalid-release-pr:
    runs-on: ubuntu-latest
    if: github.event.pull_request.state == 'open'

    steps:
      - name: Check branch naming convention
        run: |
          branch="${{ github.head_ref }}"

          if [[ ! "$branch" =~ ^R[0-9]{2}($|-|/) ]]; then
            echo "::error title=Invalid branch name::"
            echo "Dieser Pull Request darf **nicht** in master gemerged werden!"
            echo ""
            echo "Erlaubte Branches: R01, R02, ..., R99"
            echo "Aktueller Branch: $branch"
            exit 1
          fi

          echo "Branch-Name OK: $branch"
