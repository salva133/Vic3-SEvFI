name: Bump Build Number

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  bump-build-number:
    if: github.event.pull_request.merged == true
    uses: salva133/My-Workflows/.github/workflows/bump-build-number.yml@a7b34cd4067123ab5623d7caadbe45f7cf8e8fa4
    with:
      pr_number: ${{ github.event.pull_request.number }}
